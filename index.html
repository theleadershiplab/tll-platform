<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Leadership Lab - Proposal Generator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F0F3F7;min-height:100vh}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:Arial,sans-serif;background:#fff;color:#111}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2E86C1;box-shadow:0 0 0 2px rgba(46,134,193,.15)}
textarea{resize:vertical;min-height:70px}
label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:3px;margin-top:11px}
label:first-child{margin-top:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;font-family:Arial,sans-serif;transition:opacity .15s}
.btn:hover{opacity:.87}
.btn-primary{background:#1A3A5C;color:#fff}
.btn-accent{background:#2E86C1;color:#fff}
.btn-ghost{background:transparent;color:#1A3A5C;border:1.5px solid #1A3A5C}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#C0392B;color:#fff}
.btn-full{width:100%;justify-content:center;padding:11px}
.card{background:#fff;border-radius:10px;border:1px solid #e0e4ea;padding:16px}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-draft{background:#FFF3CD;color:#856404}
.badge-sent{background:#D1ECF1;color:#0C5460}
.badge-won{background:#D4EDDA;color:#155724}
.badge-lost{background:#F8D7DA;color:#721C24}
.prog-card{border:1.5px solid #e0e4ea;border-radius:8px;padding:12px 14px;cursor:pointer;margin-bottom:8px;transition:border-color .15s,background .15s}
.prog-card:hover{border-color:#2E86C1;background:#F0F7FF}
.prog-card.selected{border-color:#1A3A5C;background:#EBF2FA}
.fac-chip{border:1.5px solid #e0e4ea;border-radius:24px;padding:7px 14px;font-size:12px;cursor:pointer;display:inline-flex;align-items:center;gap:6px;margin:3px;transition:all .15s}
.fac-chip:hover{border-color:#2E86C1}
.fac-chip.selected{border-color:#1A3A5C;background:#1A3A5C;color:#fff}
.step-dot{flex:1;height:4px;background:#e0e4ea;transition:background .3s}
.step-dot.done{background:#1A3A5C}
.step-dot.active{background:#2E86C1}
.screen{display:none;align-items:center;justify-content:center;min-height:100vh;background:#F0F3F7;padding:20px}
.lcard{background:#fff;border-radius:16px;border:1px solid #e0e4ea;padding:36px 40px;width:100%;max-width:400px;text-align:center}
.emsg{border-radius:6px;padding:8px 12px;font-size:12px;margin-top:10px;text-align:left;display:none}
.emsg.err{background:#FEE;border:1px solid #FCC;color:#C0392B}
.emsg.ok{background:#D4EDDA;border:1px solid #C3E6CB;color:#155724}
.spin{width:16px;height:16px;border:2px solid rgba(255,255,255,.4);border-top-color:#fff;border-radius:50%;animation:sp .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:4px}
@keyframes sp{to{transform:rotate(360deg)}}
#app{display:flex;min-height:100vh}
.sidebar{width:210px;background:#1A3A5C;flex-shrink:0;display:flex;flex-direction:column;min-height:100vh;position:sticky;top:0;height:100vh;overflow-y:auto}
.sitem{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);border-left:3px solid transparent;transition:all .15s}
.sitem:hover{background:rgba(255,255,255,.08);color:#fff}
.sitem.active{background:rgba(46,134,193,.25);color:#fff;border-left-color:#2E86C1}
.main{flex:1;padding:24px;max-width:900px;overflow:auto}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-card{background:#fff;border-radius:8px;padding:14px;border:1px solid #e0e4ea;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:#1A3A5C}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.hrow{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f0f0f0;gap:8px;flex-wrap:wrap}
.hrow:hover{background:#F8FAFC}
.hrow:last-child{border-bottom:none}
.tpill{padding:3px 9px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#555;display:inline-block;margin:2px;transition:all .15s}
.tpill.sel{border-color:#1A3A5C;background:#1A3A5C;color:#fff}
.qbox{background:#FDF8EE;border:1px solid #E8D9A0;border-radius:8px;padding:13px 15px;margin-bottom:12px}
.toast-msg{display:none;position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);color:#fff}
.subrow{display:flex;align-items:flex-start;gap:8px;padding:6px 8px;border-radius:6px;border:1px solid #e0e4ea;margin-bottom:5px;cursor:pointer;background:#F8FAFC;transition:all .15s}
.subrow.sel{border-color:#2E86C1;background:#EBF5FB}
.subcheck{width:16px;height:16px;border-radius:3px;border:1.5px solid #ccc;display:flex;align-items:center;justify-content:center;flex-shrink:0;margin-top:2px;transition:all .15s}
.subcheck.sel{background:#2E86C1;border-color:#2E86C1}
</style>
</head>

// ── UTILS ────────────────────────────────────────────────────────────────────
function fmt(n) { return "RM " + Number(n).toLocaleString(); }
function dStr(ts) { return new Date(ts).toLocaleDateString("en-MY",{day:"numeric",month:"short",year:"numeric"}); }
function uid() { return "p_" + Date.now() + "_" + Math.random().toString(36).slice(2,6); }
function ge(id) { return document.getElementById(id); }
function initForm() {
  return {clientName:"",industry:"",contactPerson:"",contactEmail:"",phone:"",
    participants:"",deliveryMode:"In-Person",startDate:"",
    selectedProgs:[],selectedSubs:{},durations:{},rates:{},customRates:{},
    selectedFacs:[],notes:"",nextSteps:"",status:"Draft"};
}
function calcTotal(p) {
  var t = 0;
  var ss = p.selectedSubs || {};
  Object.keys(ss).forEach(function(pid) {
    (ss[pid] || []).forEach(function(sid) {
      var k = pid + "_" + sid;
      var r = (p.rates || {})[k];
      if (!r || r === "custom") t += Number((p.customRates || {})[k]) || 0;
      else t += Number(r);
    });
  });
  return t;
}
function getSubKeys() {
  var keys = [];
  (form.selectedProgs || []).forEach(function(pid) {
    ((form.selectedSubs || {})[pid] || []).forEach(function(sid) {
      keys.push(pid + "_" + sid);
    });
  });
  return keys;
}
function badgeClass(s) {
  return s === "Won" ? "badge-won" : s === "Sent" ? "badge-sent" : s === "Lost" ? "badge-lost" : "badge-draft";
}
function getSugg() {
  var s = new Set();
  (form.selectedProgs || []).forEach(function(pid) {
    var pr = PROGS.find(function(p) { return p.id === pid; });
    if (pr) pr.facs.forEach(function(f) { s.add(f); });
  });
  return Array.from(s);
}
function showToast(msg, type) {
  var t = ge("toast");
  t.textContent = msg;
  t.style.background = type === "err" ? "#C0392B" : "#1A3A5C";
  t.style.display = "block";
  setTimeout(function() { t.style.display = "none"; }, 3500);
}

// ── AUTH ─────────────────────────────────────────────────────────────────────
function showScr(id) {
  ["scr-login","scr-reset","scr-newpass"].forEach(function(s) {
    var el = ge(s);
    if (el) el.style.display = s === id ? "flex" : "none";
  });
  ge("app").style.display = "none";
}

function showPlatform(user) {
  currentUser = user;
  ge("scr-login").style.display = "none";
  ge("scr-reset").style.display = "none";
  ge("scr-newpass").style.display = "none";
  ge("app").style.display = "flex";
  ge("user-email").textContent = user.email;
  loadProposals();
  loadTrainers();
}

async function doLogin() {
  var email = ge("li-email").value.trim();
  var pass = ge("li-pass").value;
  var err = ge("li-err");
  var btn = ge("li-btn");
  err.style.display = "none";
  if (!email || !pass) { err.textContent = "Please enter your email and password."; err.style.display = "block"; return; }
  btn.innerHTML = "<span class='spin'></span>Signing in..."; btn.disabled = true;
  var r = await sb.auth.signInWithPassword({email: email, password: pass});
  btn.innerHTML = "Sign in"; btn.disabled = false;
  if (r.error) {
    var msg = r.error.message || "Sign in failed.";
    if (msg.toLowerCase().indexOf("invalid") > -1 || msg.toLowerCase().indexOf("credentials") > -1) {
      msg = "Incorrect email or password. Please try again.";
    }
    err.textContent = msg; err.style.display = "block";
  } else { showPlatform(r.data.user); }
}

async function doReset() {
  var email = ge("rs-email").value.trim();
  var err = ge("rs-err"); var ok = ge("rs-ok"); var btn = ge("rs-btn");
  err.style.display = "none"; ok.style.display = "none";
  if (!email) { err.textContent = "Please enter your email."; err.style.display = "block"; return; }
  btn.innerHTML = "<span class='spin'></span>Sending..."; btn.disabled = true;
  var r = await sb.auth.resetPasswordForEmail(email, {redirectTo: window.location.origin + window.location.pathname});
  btn.innerHTML = "Send reset link"; btn.disabled = false;
  if (r.error) { err.textContent = r.error.message; err.style.display = "block"; }
  else { ok.textContent = "Reset link sent! Check your inbox and click the link."; ok.style.display = "block"; }
}

async function doNewPass() {
  var p1 = ge("np-p1").value; var p2 = ge("np-p2").value;
  var err = ge("np-err"); var btn = ge("np-btn");
  err.style.display = "none";
  if (!p1 || p1.length < 6) { err.textContent = "Password must be at least 6 characters."; err.style.display = "block"; return; }
  if (p1 !== p2) { err.textContent = "Passwords do not match."; err.style.display = "block"; return; }
  btn.innerHTML = "<span class='spin'></span>Setting..."; btn.disabled = true;
  var r = await sb.auth.updateUser({password: p1});
  btn.innerHTML = "Set password and sign in"; btn.disabled = false;
  if (r.error) { err.textContent = r.error.message; err.style.display = "block"; }
  else { showToast("Password set! Welcome."); showPlatform(r.data.user); }
}

async function doLogout() { await sb.auth.signOut(); showScr("scr-login"); }

// ── DRAFT ─────────────────────────────────────────────────────────────────────
function saveDraft() {
  if (!currentUser || view !== "wizard" || !form.clientName) return;
  try { localStorage.setItem("tll_draft_" + currentUser.id, JSON.stringify({form:form,step:step,savedAt:Date.now()})); } catch(e) {}
}
function loadDraft() {
  if (!currentUser) return;
  try {
    var d = localStorage.getItem("tll_draft_" + currentUser.id);
    if (d) { var obj = JSON.parse(d); form = obj.form || initForm(); step = obj.step || 1; view = "wizard";
      document.querySelectorAll(".sitem").forEach(function(el) { el.classList.remove("active"); });
      ge("nav-wizard").classList.add("active"); render(); showToast("Draft restored!");
      localStorage.removeItem("tll_draft_" + currentUser.id); }
  } catch(e) {}
}
function clearDraft() { if (currentUser) try { localStorage.removeItem("tll_draft_" + currentUser.id); } catch(e) {} }

// ── DB ───────────────────────────────────────────────────────────────────────
async function loadProposals() {
  var r = await sb.from("proposals").select("*").order("created_at",{ascending:false});
  if (!r.error) {
    proposals = (r.data || []).map(function(p) {
      return {id:p.id, createdAt:p.created_at, clientName:p.client_name||"", industry:p.industry||"",
        contactPerson:p.contact_person||"", contactEmail:p.contact_email||"", phone:p.phone||"",
        participants:p.participants||"", deliveryMode:p.delivery_mode||"In-Person", startDate:p.start_date||"",
        selectedProgs:p.selected_progs||[], selectedSubs:p.topics||{}, durations:{},
        rates:p.rates||{}, customRates:p.custom_rates||{}, selectedFacs:p.selected_facs||[],
        notes:p.notes||"", nextSteps:p.next_steps||"", status:p.status||"Draft"};
    });
  }
  render();
}

async function saveProposal() {
  var id = uid();
  var r = await sb.from("proposals").insert({
    id:id, created_at:Date.now(), client_name:form.clientName, industry:form.industry,
    contact_person:form.contactPerson, contact_email:form.contactEmail, phone:form.phone,
    participants:form.participants, delivery_mode:form.deliveryMode, start_date:form.startDate,
    selected_progs:form.selectedProgs, topics:form.selectedSubs,
    selected_facs:form.selectedFacs, rates:form.rates, custom_rates:form.customRates,
    notes:form.notes, next_steps:form.nextSteps, status:form.status,
    created_by:currentUser ? currentUser.id : null
  });
  if (r.error) { showToast("Save failed: " + r.error.message, "err"); }
  else { clearDraft(); showToast("Proposal saved!"); await loadProposals(); navigate("history"); }
}

async function deleteProposal(id) {
  if (!confirm("Delete this proposal? This cannot be undone.")) return;
  var r = await sb.from("proposals").delete().eq("id", id);
  if (r.error) { showToast("Delete failed", "err"); }
  else { showToast("Deleted"); proposals = proposals.filter(function(p) { return p.id !== id; }); render(); }
}

async function updateStatus(id, s) {
  var r = await sb.from("proposals").update({status:s}).eq("id", id);
  if (!r.error) { proposals = proposals.map(function(p) { return p.id === id ? Object.assign({},p,{status:s}) : p; }); render(); }
}

// ── NAV ──────────────────────────────────────────────────────────────────────
function navigate(v) {
  saveDraft();
  view = v; step = 1;
  document.querySelectorAll(".sitem").forEach(function(el) { el.classList.remove("active"); });
  var el = ge("nav-" + v); if (el) el.classList.add("active");
  else if (v==="trainer-form") { var s=ge("nav-speakers"); if(s)s.classList.add("active"); }
  render();
}
function startNew() {
  saveDraft();
  form = initForm(); step = 1; view = "wizard";
  document.querySelectorAll(".sitem").forEach(function(el) { el.classList.remove("active"); });
  ge("nav-wizard").classList.add("active"); render();
}
function dupeProp(id) {
  var p = proposals.find(function(x) { return x.id === id; }); if (!p) return;
  form = Object.assign({}, p, {clientName: p.clientName + " (Copy)", status: "Draft"});
  step = 1; view = "wizard";
  document.querySelectorAll(".sitem").forEach(function(el) { el.classList.remove("active"); });
  ge("nav-wizard").classList.add("active"); render();
}
function toggleProg(pid) {
  form.selectedProgs = form.selectedProgs || [];
  var i = form.selectedProgs.indexOf(pid);
  if (i > -1) { form.selectedProgs.splice(i,1); if (form.selectedSubs) delete form.selectedSubs[pid]; }
  else { form.selectedProgs.push(pid); form.selectedSubs = form.selectedSubs || {}; form.selectedSubs[pid] = []; }
  render();
}
function toggleSub(pid, sid) {
  form.selectedSubs = form.selectedSubs || {}; form.selectedSubs[pid] = form.selectedSubs[pid] || [];
  var i = form.selectedSubs[pid].indexOf(sid);
  if (i > -1) {
    form.selectedSubs[pid].splice(i,1);
    var k = pid + "_" + sid; if (form.rates) delete form.rates[k]; if (form.durations) delete form.durations[k];
  } else {
    form.selectedSubs[pid].push(sid);
    var pr = PROGS.find(function(p) { return p.id === pid; });
    var sub = pr ? (pr.subs || []).find(function(s) { return s.id === sid; }) : null;
    form.rates = form.rates || {}; form.rates[pid + "_" + sid] = sub ? sub.defRate : 5000;
    form.durations = form.durations || {}; form.durations[pid + "_" + sid] = "1 Day";
  }
  render();
}
function toggleFac(id) {
  form.selectedFacs = form.selectedFacs || [];
  var i = form.selectedFacs.indexOf(id);
  if (i > -1) form.selectedFacs.splice(i,1); else form.selectedFacs.push(id);
  render();
}
function onRate(key, v) {
  form.rates = form.rates || {}; form.rates[key] = v === "custom" ? "custom" : Number(v);
  var el = ge("total-disp"); if (el) el.textContent = fmt(calcTotal(form));
}
function onDur(key, v) { form.durations = form.durations || {}; form.durations[key] = v; }
function nextStep() {
  if (step === 1) {
    form.clientName = ge("f-cn") ? ge("f-cn").value : "";
    if (!form.clientName.trim()) { alert("Please enter a client name."); return; }
    form.industry = ge("f-ind") ? ge("f-ind").value : "";
    form.contactPerson = ge("f-cp") ? ge("f-cp").value : "";
    form.contactEmail = ge("f-ce") ? ge("f-ce").value : "";
    form.phone = ge("f-ph") ? ge("f-ph").value : "";
    form.participants = ge("f-pa") ? ge("f-pa").value : "";
    form.deliveryMode = ge("f-dm") ? ge("f-dm").value : "In-Person";
    form.startDate = ge("f-sd") ? ge("f-sd").value : "";
  }
  if (step === 4) {
    form.notes = ge("f-no") ? ge("f-no").value : "";
    form.nextSteps = ge("f-ns") ? ge("f-ns").value : "";
    form.status = ge("f-st") ? ge("f-st").value : "Draft";
  }
  if (step < 4) { step++; render(); }
}
function prevStep() { if (step > 1) { step--; render(); } }

// ── RENDER ────────────────────────────────────────────────────────────────────
function render() {
  var m = ge("main"); if (!m) return;
  if (view === "dashboard") m.innerHTML = vDash();
  else if (view === "wizard") m.innerHTML = vWiz();
  else if (view === "history") m.innerHTML = vHist();
  else if (view === "speakers") m.innerHTML = vSpeak();
  else if (view === "profile") m.innerHTML = vProf();
  else if (view === "tllinfo") m.innerHTML = vTllInfo();
  else if (view === "trainer-form") m.innerHTML = vTrainerForm();
}

// ── TRAINER DB ────────────────────────────────────────────────────────────────
async function loadTrainers() {
  var r = await sb.from("trainers").select("*").order("created_at",{ascending:false});
  allTrainers = FACS.map(function(f,i) {
    return {id:f.id,full_name:f.name,title:f.title,location:f.loc,city:f.loc,nationality:"",
      timezone:"",employment_type:"Contract",status:"Active",primary_specialization:f.title,
      secondary_specializations:[],industries:[],languages:[],cefr_knowledge:"",
      certifications:f.creds||[],years_experience:10,programme_eligibility:{},
      internal_notes:"",photo:f.photo||"",quote:f.quote||"",bio:f.bio||"",brings:f.brings||[],
      isBuiltIn:true};
  });
  if (!r.error && r.data) r.data.forEach(function(t){allTrainers.push(t);});
  if (view==="speakers") render();
}

async function saveTrainer(data) {
  var isNew = !data.id || data.id === "";
  if (isNew) data.id = "t_"+Date.now()+"_"+Math.random().toString(36).slice(2,6);
  data.created_at = data.created_at || Date.now();
  var r = isNew ? await sb.from("trainers").insert(data) : await sb.from("trainers").update(data).eq("id",data.id);
  if (r.error) { showToast("Save failed: "+r.error.message,"err"); return false; }
  showToast(isNew?"Trainer added!":"Trainer updated!"); await loadTrainers(); return true;
}

async function deleteTrainer(id) {
  if (!confirm("Remove this trainer?")) return;
  var r = await sb.from("trainers").delete().eq("id",id);
  if (r.error) { showToast("Delete failed","err"); return; }
  showToast("Trainer removed"); allTrainers=allTrainers.filter(function(t){return t.id!==id;}); render();
}

function addLangRow() {
  var container = ge("lang-rows");
  if (!container) return;
  var idx = container.children.length;
  var div = document.createElement("div");
  div.style.cssText = "display:flex;gap:8px;margin-bottom:6px";
  div.innerHTML = '<input type="text" id="lang-name-'+idx+'" placeholder="Language" style="flex:1"><input type="text" id="lang-level-'+idx+'" placeholder="Proficiency" style="width:140px">';
  container.appendChild(div);
}

async function submitTrainerForm() {
  var name = ge("tf-name") ? ge("tf-name").value.trim() : "";
  if (!name) { showToast("Full name is required","err"); return; }

  // Collect languages
  var langs = []; var li = 0;
  while (ge("lang-name-"+li)) {
    var ln = ge("lang-name-"+li).value.trim();
    var ll = ge("lang-level-"+li) ? ge("lang-level-"+li).value.trim() : "";
    if (ln) langs.push(ll ? {lang:ln,level:ll} : ln);
    li++;
  }

  // Collect programme eligibility
  var elig = {};
  PROG_ELIGIBILITY.forEach(function(prog) {
    var el = ge("elig-"+prog.replace(/[^a-z0-9]/gi,'_'));
    if (el) elig[prog] = el.checked;
  });

  function lines(id) {
    var el = ge(id); if (!el) return [];
    return el.value.split('\n').map(function(s){return s.trim();}).filter(Boolean);
  }

  var data = {
    id: trainerFormId || "",
    created_at: Date.now(),
    full_name: name,
    title: ge("tf-title") ? ge("tf-title").value : "",
    location: ge("tf-location") ? ge("tf-location").value : "",
    city: ge("tf-city") ? ge("tf-city").value : "",
    timezone: ge("tf-tz") ? ge("tf-tz").value : "",
    nationality: ge("tf-nat") ? ge("tf-nat").value : "",
    employment_type: ge("tf-emptype") ? ge("tf-emptype").value : "Freelance",
    status: ge("tf-status") ? ge("tf-status").value : "Active",
    primary_specialization: ge("tf-primary") ? ge("tf-primary").value : "",
    secondary_specializations: lines("tf-secondary"),
    industries: lines("tf-industries"),
    languages: langs,
    cefr_knowledge: ge("tf-cefr") ? ge("tf-cefr").value : "",
    certifications: lines("tf-certs"),
    years_experience: ge("tf-years") ? Number(ge("tf-years").value)||0 : 0,
    programme_eligibility: elig,
    internal_notes: ge("tf-notes") ? ge("tf-notes").value : "",
    quote: ge("tf-quote") ? ge("tf-quote").value : "",
    bio: ge("tf-bio") ? ge("tf-bio").value : "",
    brings: lines("tf-brings")
  };

  var ok = await saveTrainer(data);
  if (ok) { trainerFormId = null; navigate("speakers"); }
}

var _rawHash = window.location.hash || "";
var _isRecovery = _rawHash.indexOf("type=recovery") > -1 || _rawHash.indexOf("type=invite") > -1;
if (_isRecovery) { ge("scr-login").style.display="none"; ge("scr-newpass").style.display="flex"; }

sb.auth.onAuthStateChange(function(event, session) {
  if (event === "PASSWORD_RECOVERY" || (_isRecovery && event === "SIGNED_IN")) {
    ge("scr-login").style.display="none"; ge("scr-newpass").style.display="flex";
  } else if (event === "SIGNED_IN" && !_isRecovery) {
    if (session && session.user) showPlatform(session.user);
  } else if (event === "USER_UPDATED") {
    _isRecovery = false;
    if (session && session.user) showPlatform(session.user);
  } else if (event === "SIGNED_OUT") {
    showScr("scr-login");
  }
});

if (!_isRecovery) {
  sb.auth.getSession().then(function(res) {
    if (res.data && res.data.session && res.data.session.user) { showPlatform(res.data.session.user); }
  });
}
