<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>The Leadership Lab &mdash; Proposal Generator</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.30.0/dist/tabler-icons.min.css">
<style>
*{box-sizing:border-box;margin:0;padding:0}
body{font-family:Arial,sans-serif;background:#F0F3F7;min-height:100vh}
input,select,textarea{width:100%;padding:9px 11px;border:1px solid #ccc;border-radius:6px;font-size:13px;font-family:Arial,sans-serif;background:#fff;color:#111}
input:focus,select:focus,textarea:focus{outline:none;border-color:#2E86C1;box-shadow:0 0 0 2px rgba(46,134,193,.15)}
textarea{resize:vertical;min-height:70px}
label{display:block;font-size:12px;font-weight:600;color:#444;margin-bottom:3px;margin-top:11px}
label:first-child{margin-top:0}
.btn{display:inline-flex;align-items:center;gap:5px;padding:9px 18px;border:none;border-radius:6px;font-size:13px;font-weight:600;cursor:pointer;transition:opacity .15s;font-family:Arial,sans-serif}
.btn:hover{opacity:.86}
.btn-primary{background:#1A3A5C;color:#fff}
.btn-accent{background:#2E86C1;color:#fff}
.btn-ghost{background:transparent;color:#1A3A5C;border:1.5px solid #1A3A5C}
.btn-sm{padding:5px 12px;font-size:12px}
.btn-danger{background:#C0392B;color:#fff}
.btn-full{width:100%;justify-content:center;padding:11px}
.card{background:#fff;border-radius:10px;border:1px solid #e0e4ea;padding:16px}
.tag{display:inline-block;padding:3px 9px;border-radius:20px;font-size:11px;font-weight:600}
.badge-draft{background:#FFF3CD;color:#856404}
.badge-sent{background:#D1ECF1;color:#0C5460}
.badge-won{background:#D4EDDA;color:#155724}
.badge-lost{background:#F8D7DA;color:#721C24}
.prog-card{border:1.5px solid #e0e4ea;border-radius:8px;padding:12px 14px;cursor:pointer;transition:border-color .15s,background .15s;margin-bottom:8px}
.prog-card:hover{border-color:#2E86C1;background:#F0F7FF}
.prog-card.selected{border-color:#1A3A5C;background:#EBF2FA}
.fac-chip{border:1.5px solid #e0e4ea;border-radius:24px;padding:7px 14px;font-size:12px;cursor:pointer;transition:all .15s;display:inline-flex;align-items:center;gap:6px;margin:3px}
.fac-chip:hover{border-color:#2E86C1}
.fac-chip.selected{border-color:#1A3A5C;background:#1A3A5C;color:#fff}
.step-dot{flex:1;height:4px;background:#e0e4ea;transition:background .3s}
.step-dot.done{background:#1A3A5C}
.step-dot.active{background:#2E86C1}
#app{display:flex;min-height:100vh}
.sidebar{width:210px;background:#1A3A5C;flex-shrink:0;display:flex;flex-direction:column;min-height:100vh;position:sticky;top:0;height:100vh}
.sidebar-item{display:flex;align-items:center;gap:9px;padding:11px 16px;cursor:pointer;font-size:13px;color:rgba(255,255,255,.7);border-left:3px solid transparent;transition:all .15s}
.sidebar-item:hover{background:rgba(255,255,255,.08);color:#fff}
.sidebar-item.active{background:rgba(46,134,193,.25);color:#fff;border-left-color:#2E86C1}
.main{flex:1;padding:24px;overflow:auto;max-width:880px}
.row2{display:grid;grid-template-columns:1fr 1fr;gap:12px}
.row3{display:grid;grid-template-columns:1fr 1fr 1fr;gap:10px}
.stat-card{background:#fff;border-radius:8px;padding:14px;border:1px solid #e0e4ea;text-align:center}
.stat-num{font-size:26px;font-weight:700;color:#1A3A5C}
.stat-label{font-size:11px;color:#888;margin-top:2px}
.hist-row{display:flex;align-items:center;padding:11px 14px;border-bottom:1px solid #f0f0f0;gap:8px;flex-wrap:wrap}
.hist-row:hover{background:#F8FAFC}
.hist-row:last-child{border-bottom:none}
.topic-pill{padding:3px 9px;border-radius:20px;font-size:11px;cursor:pointer;border:1px solid #ccc;background:#fff;color:#555;transition:all .15s;display:inline-block;margin:2px}
.topic-pill.sel{border-color:#1A3A5C;background:#1A3A5C;color:#fff}
.quote-box{background:#FDF8EE;border:1px solid #E8D9A0;border-radius:8px;padding:13px 15px;margin-bottom:12px}
.toast{display:none;position:fixed;bottom:24px;right:24px;padding:10px 18px;border-radius:8px;font-size:13px;font-weight:600;z-index:9999;box-shadow:0 4px 16px rgba(0,0,0,.25);color:#fff}
.toast.show{display:block}
.toast.success{background:#1A3A5C}
.toast.error{background:#C0392B}
#login-screen{display:flex;align-items:center;justify-content:center;min-height:100vh;background:#F0F3F7;padding:20px}
.login-card{background:#fff;border-radius:16px;border:1px solid #e0e4ea;padding:36px 40px;width:100%;max-width:400px;text-align:center}
.spin{width:22px;height:22px;border:3px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:inline-block;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
.err-msg{background:#FEE;border:1px solid #FCC;border-radius:6px;padding:8px 12px;font-size:12px;color:#C0392B;margin-top:10px;text-align:left}
.loading-overlay{position:fixed;inset:0;background:rgba(240,243,247,.85);display:flex;align-items:center;justify-content:center;z-index:8888;font-size:14px;color:#1A3A5C;font-weight:600;gap:10px}
</style>
</head>

// AUTH
async function doLogin(){
  var email=document.getElementById("login-email").value.trim();
  var pass=document.getElementById("login-password").value;
  var btn=document.getElementById("login-btn");
  var err=document.getElementById("login-error");
  if(!email||!pass){err.style.display="block";err.textContent="Please enter your email and password.";return;}
  btn.innerHTML='<span class="spin"></span>Signing in...';btn.disabled=true;err.style.display="none";
  var result=await sb.auth.signInWithPassword({email:email,password:pass});
  if(result.error){
    err.style.display="block";err.textContent=result.error.message;
    btn.innerHTML="Sign in";btn.disabled=false;
  }
}

async function doLogout(){
  await sb.auth.signOut();
  document.getElementById("app").style.display="none";
  document.getElementById("login-screen").style.display="flex";
  document.getElementById("login-btn").innerHTML="Sign in";
  document.getElementById("login-btn").disabled=false;
  document.getElementById("login-password").value="";
}

function showPlatform(user){
  currentUser=user;
  document.getElementById("login-screen").style.display="none";
  document.getElementById("app").style.display="flex";
  document.getElementById("user-email").textContent=user.email;
  loadProposals();
}

// DB OPERATIONS
async function loadProposals(){
  showLoading(true);
  var result=await sb.from("proposals").select("*").order("created_at",{ascending:false});
  if(result.error){showToast("Could not load proposals: "+result.error.message,"error");}
  else{
    proposals=(result.data||[]).map(function(p){
      return {id:p.id,createdAt:p.created_at,clientName:p.client_name,industry:p.industry,contactPerson:p.contact_person,contactEmail:p.contact_email,phone:p.phone,participants:p.participants,deliveryMode:p.delivery_mode,startDate:p.start_date,selectedProgs:p.selected_progs||[],topics:p.topics||{},selectedFacs:p.selected_facs||[],rates:p.rates||{},customRates:p.custom_rates||{},notes:p.notes||"",nextSteps:p.next_steps||"",status:p.status||"Draft",createdBy:p.created_by};
    });
  }
  showLoading(false);render();
}

async function saveProp(){
  var id=uid();
  var row={id:id,created_at:Date.now(),client_name:form.clientName,industry:form.industry,contact_person:form.contactPerson,contact_email:form.contactEmail,phone:form.phone,participants:form.participants,delivery_mode:form.deliveryMode,start_date:form.startDate,selected_progs:form.selectedProgs,topics:form.topics,selected_facs:form.selectedFacs,rates:form.rates,custom_rates:form.customRates,notes:form.notes,next_steps:form.nextSteps,status:form.status,created_by:currentUser?currentUser.id:null};
  showLoading(true);
  var result=await sb.from("proposals").insert(row);
  showLoading(false);
  if(result.error){showToast("Save failed: "+result.error.message,"error");}
  else{showToast("Proposal saved!");await loadProposals();navigate("history");}
}

async function deleteProp(id){
  if(!confirm("Delete this proposal? This cannot be undone."))return;
  showLoading(true);
  var result=await sb.from("proposals").delete().eq("id",id);
  showLoading(false);
  if(result.error){showToast("Delete failed: "+result.error.message,"error");}
  else{showToast("Proposal deleted");proposals=proposals.filter(function(p){return p.id!==id;});render();}
}

async function updateStatus(id,s){
  var result=await sb.from("proposals").update({status:s}).eq("id",id);
  if(result.error){showToast("Update failed","error");}
  else{proposals=proposals.map(function(p){return p.id===id?Object.assign({},p,{status:s}):p;});render();}
}

// NAV
function navigate(v){view=v;step=1;document.querySelectorAll(".sidebar-item").forEach(function(el){el.classList.remove("active");});var el=document.getElementById("nav-"+v);if(el)el.classList.add("active");render();}
function startNew(){form=initForm();step=1;view="wizard";document.querySelectorAll(".sidebar-item").forEach(function(el){el.classList.remove("active");});document.getElementById("nav-wizard").classList.add("active");render();}
function dupeProp(id){var p=proposals.find(function(x){return x.id===id;});if(!p)return;form=Object.assign({},p,{clientName:p.clientName+" (Copy)",status:"Draft"});step=1;view="wizard";document.querySelectorAll(".sidebar-item").forEach(function(el){el.classList.remove("active");});document.getElementById("nav-wizard").classList.add("active");render();}

function toggleProg(id){form.selectedProgs=form.selectedProgs||[];var i=form.selectedProgs.indexOf(id);if(i>-1)form.selectedProgs.splice(i,1);else{form.selectedProgs.push(id);form.rates=form.rates||{};var pr=PROGS.find(function(p){return p.id===id;});if(!form.rates[id]&&pr)form.rates[id]=pr.rate;}render();}
function toggleTopic(pid,t){form.topics=form.topics||{};form.topics[pid]=form.topics[pid]||[];var i=form.topics[pid].indexOf(t);if(i>-1)form.topics[pid].splice(i,1);else form.topics[pid].push(t);render();}
function toggleFac(id){form.selectedFacs=form.selectedFacs||[];var i=form.selectedFacs.indexOf(id);if(i>-1)form.selectedFacs.splice(i,1);else form.selectedFacs.push(id);render();}
function onRateChange(pid,v){form.rates=form.rates||{};form.rates[pid]=v==="custom"?"custom":Number(v);updateTotal();render();}
function updateTotal(){var el=document.getElementById("total-display");if(el)el.textContent=fmt(getTotal());}

function nextStep(){
  if(step===1){
    var fn=document.getElementById("f-clientName");form.clientName=fn?fn.value:"";
    if(!form.clientName.trim()){alert("Please enter a client name.");return;}
    var fi=document.getElementById("f-industry");form.industry=fi?fi.value:"";
    var fc=document.getElementById("f-contactPerson");form.contactPerson=fc?fc.value:"";
    var fe=document.getElementById("f-contactEmail");form.contactEmail=fe?fe.value:"";
    var fp=document.getElementById("f-phone");form.phone=fp?fp.value:"";
    var fpa=document.getElementById("f-participants");form.participants=fpa?fpa.value:"";
    var fd=document.getElementById("f-deliveryMode");form.deliveryMode=fd?fd.value:"In-Person";
    var fs=document.getElementById("f-startDate");form.startDate=fs?fs.value:"";
  }
  if(step===4){
    var fn2=document.getElementById("f-notes");form.notes=fn2?fn2.value:"";
    var fns=document.getElementById("f-nextSteps");form.nextSteps=fns?fns.value:"";
    var fst=document.getElementById("f-status");form.status=fst?fst.value:"Draft";
  }
  if(step<4){step++;render();}
}
function prevStep(){if(step>1){step--;render();}}

// RENDER
function render(){var m=document.getElementById("main");if(!m)return;if(view==="dashboard")m.innerHTML=vDash();else if(view==="wizard")m.innerHTML=vWizard();else if(view==="history")m.innerHTML=vHistory();else if(view==="speakers")m.innerHTML=vSpeakers();else if(view==="profile")m.innerHTML=vProfile();}

function vDash(){
  var tot=proposals.length,sent=proposals.filter(function(p){return p.status==="Sent";}).length,won=proposals.filter(function(p){return p.status==="Won";}).length;
  var rows=proposals.length===0?'<div style="text-align:center;padding:32px;color:#aaa;font-size:13px">No proposals yet. Create your first one.</div>':
  proposals.slice(0,6).map(function(p){return '<div class="hist-row"><div style="flex:1;min-width:160px"><div style="font-weight:700;font-size:13px;color:'+N+'">'+p.clientName+'</div><div style="font-size:11px;color:#888">'+(p.industry||"")+' &middot; '+dStr(p.createdAt)+'</div></div><span class="tag '+badgeClass(p.status)+'">'+p.status+'</span><div style="font-weight:700;font-size:12px;color:'+N+';min-width:80px;text-align:right">'+fmt(progTotal(p))+'</div><button class="btn btn-ghost btn-sm" onclick="dupeProp(''+p.id+'')">Duplicate</button></div>';}).join("");
  var pills=PROGS.filter(function(p){return p.id!=="custom";}).map(function(pr){return '<div style="border:1px solid #e0e4ea;border-radius:7px;padding:10px 12px;background:#FAFBFC"><div style="display:flex;align-items:center;gap:7px;margin-bottom:3px"><i class="ti '+pr.icon+'" style="color:'+N+';font-size:15px"></i><span style="font-weight:700;font-size:12px;color:'+N+'">'+pr.name+'</span></div><div style="font-size:11px;color:#888">'+pr.tag+"</div></div>";}).join("");
  return '<h2 style="font-size:20px;font-weight:700;color:'+N+';margin-bottom:4px">Dashboard</h2><p style="font-size:12px;color:#888;margin-bottom:20px">The Leadership Lab &mdash; Proposal Generator</p><div class="row3" style="margin-bottom:18px"><div class="stat-card"><div class="stat-num">'+tot+'</div><div class="stat-label">Total proposals</div></div><div class="stat-card"><div class="stat-num">'+sent+'</div><div class="stat-label">Sent to clients</div></div><div class="stat-card"><div class="stat-num">'+won+'</div><div class="stat-label">Won</div></div></div><div class="card" style="margin-bottom:16px"><div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:14px"><span style="font-weight:700;font-size:14px;color:'+N+'">Recent proposals</span><button class="btn btn-primary btn-sm" onclick="startNew()"><i class="ti ti-plus"></i>New proposal</button></div>'+rows+'</div><div class="card"><div style="font-weight:700;font-size:13px;color:'+N+';margin-bottom:12px">Our four pillars</div><div style="display:grid;grid-template-columns:1fr 1fr;gap:8px">'+pills+'</div></div>';
}

function vWizard(){
  var steps=["Client details","Programmes","Facilitators","Costs & review"];
  var bars=steps.map(function(_,i){return '<div class="step-dot '+(i<step-1?"done":i===step-1?"active":"")+'"></div>';}).join('<div style="width:3px"></div>');
  var labels=steps.map(function(s,i){return '<div style="font-size:10px;'+(i===step-1?"color:"+N+";font-weight:700":"color:#aaa")+'">'+s+'</div>';}).join("");
  var body="";
  if(step===1){
    body='<div class="row2"><div><label>Client / company name</label><input id="f-clientName" value="'+((form.clientName||"").replace(/"/g,"&quot;"))+'" placeholder="e.g. MODEC Berhad"></div><div><label>Industry</label><select id="f-industry">'+INDS.map(function(i){return '<option '+(form.industry===i?"selected":"")+'>'+i+'</option>';}).join("")+'</select></div></div><div class="row2"><div><label>Contact person</label><input id="f-contactPerson" value="'+((form.contactPerson||"").replace(/"/g,"&quot;"))+'"></div><div><label>Contact email</label><input id="f-contactEmail" type="email" value="'+((form.contactEmail||"").replace(/"/g,"&quot;"))+'"></div></div><div class="row2"><div><label>Phone</label><input id="f-phone" value="'+((form.phone||"").replace(/"/g,"&quot;"))+'"></div><div><label>Number of participants</label><input id="f-participants" type="number" value="'+(form.participants||"")+'"></div></div><div class="row2"><div><label>Delivery mode</label><select id="f-deliveryMode">'+MODES.map(function(m){return '<option '+(form.deliveryMode===m?"selected":"")+'>'+m+'</option>';}).join("")+'</select></div><div><label>Proposed start date</label><input id="f-startDate" type="date" value="'+(form.startDate||"")+'"></div></div>';
  } else if(step===2){
    body='<p style="font-size:12px;color:#666;margin-bottom:12px">Select programmes. Click topics to highlight focus areas.</p>'+PROGS.map(function(pr){
      var selP=(form.selectedProgs||[]).indexOf(pr.id)>-1;
      var selT=(form.topics||{})[pr.id]||[];
      var tpills=selP?'<div style="font-size:11px;font-weight:700;color:'+N+';margin-bottom:5px">Focus topics:</div><div>'+pr.topics.map(function(t){return '<span class="topic-pill '+(selT.indexOf(t)>-1?"sel":"")+'" onclick="event.stopPropagation();toggleTopic(''+pr.id+'',''+t+'')">'+t+'</span>';}).join("")+"</div>":"";
      return '<div class="prog-card '+(selP?"selected":"")+'" onclick="toggleProg(''+pr.id+'')"><div style="display:flex;align-items:flex-start;gap:10px"><div style="width:30px;height:30px;border-radius:6px;background:'+(selP?N:"#E8EFF7")+';display:flex;align-items:center;justify-content:center;flex-shrink:0"><i class="ti '+pr.icon+'" style="color:'+(selP?"#fff":N)+';font-size:15px"></i></div><div style="flex:1"><div style="font-weight:700;font-size:13px;color:'+N+'">'+pr.name+'</div><div style="font-size:11px;color:#888;margin-bottom:4px">'+pr.tag+'</div><div style="font-size:12px;color:#555;margin-bottom:'+(selP?"8":"0")+'px">'+pr.desc+"</div>"+tpills+"</div></div></div>";
    }).join("");
  } else if(step===3){
    var sugg=getSuggested();
    var selF=form.selectedFacs||[];
    var chips=FACS.map(function(f){return '<div class="fac-chip '+(selF.indexOf(f.id)>-1?"selected":"")+'" onclick="toggleFac(''+f.id+'')"><div><div style="font-weight:600;font-size:12px">'+f.name+'</div><div style="font-size:10px;opacity:.8">'+f.loc+'</div></div></div>';}).join("");
    var fcards=selF.length===0?"":selF.map(function(id){var f=FACS.find(function(x){return x.id===id;});if(!f)return "";return '<div style="display:flex;align-items:flex-start;gap:10px;padding:10px 12px;border:1px solid #e0e4ea;border-radius:8px;margin-bottom:8px;background:#FAFBFC"><div style="width:36px;height:36px;border-radius:50%;background:'+N+';display:flex;align-items:center;justify-content:center;color:#fff;font-size:12px;font-weight:700;flex-shrink:0">'+f.name.split(" ").map(function(w){return w[0];}).slice(0,2).join("")+'</div><div><div style="font-weight:700;font-size:13px;color:'+N+'">'+f.name+'</div><div style="font-size:11px;color:#666">'+f.title+' &middot; '+f.loc+'</div><div style="font-size:11px;color:#aaa;font-style:italic;margin-top:3px">&ldquo;'+f.quote+'&rdquo;</div></div></div>';}).join("");
    var suggBox=sugg.length>0?'<div style="background:#EBF5FB;border-radius:6px;padding:8px 12px;margin-bottom:12px;font-size:12px;color:#0C5460"><i class="ti ti-sparkles"></i> <strong>Suggested:</strong> '+sugg.map(function(id){var f=FACS.find(function(x){return x.id===id;});return f?f.name:"";}).join(", ")+"</div>":"";
    body='<p style="font-size:12px;color:#666;margin-bottom:10px">Auto-suggested based on your selected programmes. Fully flexible.</p>'+suggBox+'<div style="display:flex;flex-wrap:wrap;gap:6px;margin-bottom:14px">'+chips+"</div>"+fcards;
  } else {
    var sOpts=STATUS.map(function(s){return '<option '+(form.status===s?"selected":"")+'>'+s+'</option>';}).join("");
    var progRows=(form.selectedProgs||[]).length===0?'<p style="color:#aaa;font-size:12px;margin-bottom:16px">No programmes selected.</p>':
    (form.selectedProgs||[]).map(function(pid){
      var pr=PROGS.find(function(p){return p.id===pid;});if(!pr)return "";
      var cv=(form.rates||{})[pid];
      var rSel='<select id="rate-'+pid+'" style="width:135px" onchange="onRateChange(''+pid+'',this.value)">'+RATES.map(function(r){return '<option value="'+r.v+'" '+(cv==r.v?"selected":"")+'>'+r.l+'</option>';}).join("")+'</select>';
      var rAmt=cv==="custom"?'<input id="custom-'+pid+'" type="number" placeholder="Enter amount" value="'+((form.customRates||{})[pid]||"")+'" style="width:130px" oninput="form.customRates=form.customRates||{};form.customRates[''+pid+'']=this.value;updateTotal()">':'<div style="font-weight:700;font-size:13px;color:'+N+';min-width:90px;text-align:right">'+fmt(cv||pr.rate)+"</div>";
      return '<div style="display:flex;align-items:center;gap:10px;padding:10px 13px;border:1px solid #e0e4ea;border-radius:7px;margin-bottom:8px;background:#FAFBFC;flex-wrap:wrap"><i class="ti '+pr.icon+'" style="color:'+N+';font-size:17px;width:20px"></i><div style="flex:1;font-weight:600;font-size:13px;color:'+N+';min-width:160px">'+pr.name+"</div>"+rSel+rAmt+"</div>";
    }).join("");
    body='<div style="margin-bottom:16px"><label>Proposal status</label><select id="f-status" style="width:200px">'+sOpts+'</select></div><div style="font-weight:700;font-size:13px;color:'+N+';margin-bottom:10px">Programme fees</div>'+progRows+'<div style="padding:12px 16px;background:'+N+';border-radius:8px;display:flex;justify-content:space-between;align-items:center;margin-bottom:16px"><span style="color:rgba(255,255,255,.8);font-size:13px;font-weight:600">Total investment</span><span id="total-display" style="color:#fff;font-size:17px;font-weight:700">'+fmt(getTotal())+'</span></div><label>Additional notes</label><textarea id="f-notes" placeholder="e.g. Client keen on a pilot cohort, dates TBC">'+(form.notes||"")+'</textarea><label>Next steps</label><textarea id="f-nextSteps" placeholder="e.g. Follow-up call 15 July">'+(form.nextSteps||"")+'</textarea><div style="margin-top:16px;padding:14px;background:#EBF5FB;border-radius:8px;font-size:12px;line-height:1.9;color:#333"><strong style="color:'+N+'">Summary</strong><br><b>Client:</b> '+(form.clientName||"&mdash;")+' &nbsp;&middot;&nbsp; <b>Industry:</b> '+(form.industry||"&mdash;")+'<br><b>Contact:</b> '+(form.contactPerson||"&mdash;")+' &nbsp;&middot;&nbsp; '+(form.contactEmail||"&mdash;")+'<br><b>Participants:</b> '+(form.participants||"&mdash;")+' &nbsp;&middot;&nbsp; <b>Delivery:</b> '+form.deliveryMode+'<br><b>Programmes:</b> '+((form.selectedProgs||[]).map(function(id){var p=PROGS.find(function(x){return x.id===id;});return p?p.name:"";}).join(", ")||"&mdash;")+'<br><b>Facilitators:</b> '+((form.selectedFacs||[]).map(function(id){var f=FACS.find(function(x){return x.id===id;});return f?f.name:"";}).join(", ")||"&mdash;")+'</div>';
  }
  var backBtn=step===1?'<button class="btn btn-ghost" onclick="navigate('dashboard')">Cancel</button>':'<button class="btn btn-ghost" onclick="prevStep()">&larr; Back</button>';
  var nextBtn=step<4?'<button class="btn btn-primary" onclick="nextStep()">Continue &rarr;</button>':'<button class="btn btn-accent" onclick="saveProp()"><i class="ti ti-device-floppy"></i> Save proposal</button>';
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><h2 style="font-size:18px;font-weight:700;color:'+N+'">New proposal</h2><span style="font-size:12px;color:#888">Step '+step+' of 4 &mdash; '+steps[step-1]+'</span></div><div style="display:flex;gap:4px;margin-bottom:6px">'+bars+'</div><div style="display:flex;justify-content:space-between;margin-bottom:18px">'+labels+'</div><div class="card">'+body+'</div><div style="display:flex;justify-content:space-between;align-items:center;margin-top:16px">'+backBtn+nextBtn+"</div>";
}

function vHistory(){
  var rows=proposals.length===0?'<div style="text-align:center;padding:48px;color:#aaa">No saved proposals yet.</div>':
  proposals.map(function(p){
    var sOpts=STATUS.map(function(s){return '<option '+(p.status===s?"selected":"")+'>'+s+'</option>';}).join("");
    return '<div class="hist-row"><div style="flex:1;min-width:160px"><div style="font-weight:700;font-size:13px;color:'+N+'">'+(p.clientName||"Unnamed")+'</div><div style="font-size:11px;color:#888">'+(p.industry||"")+' &middot; '+(p.deliveryMode||"")+' &middot; '+dStr(p.createdAt)+'</div><div style="font-size:11px;color:#555;margin-top:2px">'+((p.selectedProgs||[]).map(function(id){var pr=PROGS.find(function(x){return x.id===id;});return pr?pr.name:"";}).join(" &middot; "))+'</div></div><select style="padding:4px 6px;font-size:11px;border:1px solid #ddd;border-radius:5px;background:#fff;width:90px" onchange="updateStatus(''+p.id+'',this.value)">'+sOpts+'</select><span class="tag '+badgeClass(p.status)+'">'+p.status+'</span><div style="font-weight:700;font-size:12px;color:'+N+';min-width:80px;text-align:right">'+fmt(progTotal(p))+'</div><button class="btn btn-ghost btn-sm" onclick="dupeProp(''+p.id+'')"><i class="ti ti-copy"></i></button><button class="btn btn-danger btn-sm" onclick="deleteProp(''+p.id+'')"><i class="ti ti-trash"></i></button></div>';
  }).join("");
  return '<div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:18px"><h2 style="font-size:18px;font-weight:700;color:'+N+'">Client history</h2><button class="btn btn-primary btn-sm" onclick="startNew()"><i class="ti ti-plus"></i> New proposal</button></div><div class="card" style="padding:0;overflow:hidden">'+rows+"</div>";
}

function vSpeakers(){
  var cards=FACS.map(function(f){
    var brings=f.brings.map(function(b){return '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:12px;color:#444"><i class="ti ti-check" style="color:'+B+';font-size:14px;flex-shrink:0;margin-top:1px"></i>'+b+'</div>';}).join("");
    var creds=f.creds.map(function(c){return '<div style="display:flex;align-items:flex-start;gap:6px;margin-bottom:5px;font-size:12px;color:#444"><i class="ti ti-certificate" style="color:'+N+';font-size:14px;flex-shrink:0;margin-top:1px"></i>'+c+'</div>';}).join("");
    return '<div style="background:#fff;border-radius:12px;border:1px solid #e0e4ea;overflow:hidden;margin-bottom:16px"><div style="background:'+B+';padding:12px 20px;text-align:center"><div style="font-weight:700;font-size:15px;color:#fff">'+f.name+'</div><div style="font-size:12px;color:rgba(255,255,255,.85);margin-top:2px">'+f.title+' &middot; '+f.loc+'</div></div><div style="padding:16px 18px"><div class="quote-box"><div style="font-style:italic;font-weight:600;color:#5B4A22;font-size:13px;line-height:1.5;margin-bottom:9px">&ldquo;'+f.quote+'&rdquo;</div><p style="font-size:12px;color:#5B4A22;line-height:1.7">'+f.bio+'</p></div><div class="row2" style="gap:16px;margin-top:4px"><div><div style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:'+N+';margin-bottom:7px">What '+(f.pronoun==="she"?"she":"he")+' brings</div>'+brings+'</div><div><div style="font-weight:700;font-size:11px;text-transform:uppercase;letter-spacing:.6px;color:'+N+';margin-bottom:7px">Key credentials</div>'+creds+'</div></div></div></div>';
  }).join("");
  return '<h2 style="font-size:18px;font-weight:700;color:'+N+';margin-bottom:4px">Speaker profiles</h2><p style="font-size:12px;color:#888;margin-bottom:20px">All five facilitators available for deployment across any TLL programme.</p>'+cards;
